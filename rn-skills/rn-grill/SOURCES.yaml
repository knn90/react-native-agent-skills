# Provenance + freshness tracking for the rn-grill skill.
# Maintained by rn-skill-consolidate — do not hand-edit pinned_commit / last_synced.
# NOTE: rn-grill is a WORKFLOW skill (bespoke orchestration, NOT synthesized domain knowledge).
# It is AUDIT-ONLY: the consolidator runs source staleness + discovery (Step 1) and surfaces
# new/dead sources as a PR, but NEVER auto-merges content into SKILL.md. A human adapts the
# ideas by hand (selectively), the way the current methodology was adopted.

skill: rn-grill
domain: plan stress-testing (interactive decision interrogation to harden an implementation plan)
mode: audit-only          # discovery + staleness only; synthesis is SKIPPED
last_consolidated: 2026-06-30   # never auto-synthesized — this skill is hand-curated

discovery:
  enabled: true
  queries:
    - "grill me agent skill plan review"
    - "interview me agent skill clarify intent"
    - "stress test plan assumptions agent skill"
    - "one question at a time clarifying agent skill"
  authority_anchors:
    - "the consuming project's rules_file (per .claude/rn-profile.md)"
    - "React — react.dev / React Native — reactnative.dev / Expo — docs.expo.dev (where a decision is an RN-platform question)"

